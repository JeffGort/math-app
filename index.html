/* ════════════════════════════════════════════
   CHALLENGE MODE (beat the clock)
   ════════════════════════════════════════════ */
function toggleChallenge() {
  if (state.challengeActive) {
    if (state.challengePaused) return;
    pauseChallenge();
  } else if (state.mode !== 'auto') {
    startChallenge();
  }
}

function scheduleChallengeTick() {
  clearInterval(state.challengeTimer);
  state.challengeTimer = setInterval(() => {
    state.challengeTimeLeft--;
    challengeTimer.textContent = state.challengeTimeLeft;
    const pct = (state.challengeTimeLeft / state.challengeTotal) * 100;
    challengeFill.style.width = pct + '%';
    if (state.challengeTimeLeft <= 10) challengeFill.classList.add('warning');
    else challengeFill.classList.remove('warning');
    if (state.challengeTimeLeft <= 0) endChallenge();
  }, 1000);
}

function pauseChallenge() {
  if (!state.challengeActive || state.challengePaused) return;
  clearInterval(state.challengeTimer);
  state.challengeTimer = null;
  state.challengePaused = true;
  challengePauseOverlay.classList.add('visible');
  challengePauseOverlay.setAttribute('aria-hidden', 'false');
}

function resumeChallenge() {
  if (!state.challengeActive || !state.challengePaused) return;
  state.challengePendingAction = null;
  state.challengePaused = false;
  challengePauseOverlay.classList.remove('visible');
  challengePauseOverlay.setAttribute('aria-hidden', 'true');
  scheduleChallengeTick();
}

function startChallenge() {
  state.challengeActive = true;
  state.challengePaused = false;
  state.challengeCorrect = 0;
  state.challengeTimeLeft = state.challengeTotal;
  btnChallenge.classList.add('active');
  challengeBar.classList.add('visible');
  challengeScore.textContent = '0';
  challengeTimer.textContent = state.challengeTotal;
  challengeFill.style.width = '100%';
  challengeFill.classList.remove('warning');
  challengePauseOverlay.classList.remove('visible');
  challengePauseOverlay.setAttribute('aria-hidden', 'true');

  speak(t('speechChallengeStart'));
  generateQuestion(); renderQuestion();

  scheduleChallengeTick();
}

function endChallenge(silent) {
  clearInterval(state.challengeTimer);
  state.challengeTimer = null;
  state.challengeActive = false;
  state.challengePaused = false;
  state.challengePendingAction = null;
  if (silent) {
    state.afterChallengeResultsAction = null;
  }
  challengePauseOverlay.classList.remove('visible');
  challengePauseOverlay.setAttribute('aria-hidden', 'true');
  btnChallenge.classList.remove('active');
  challengeBar.classList.remove('visible');
  if (silent) return;

  const score = state.challengeCorrect;
  $('resultNum').textContent = score;
  $('resultLabel').textContent = t('challengeResultLabel');

  const { currentId } = saveToLeaderboard(score);
  renderLeaderboard(currentId);
  challengeResults.classList.add('visible');

  if (score >= 10) {
    speak(t('speechChallengeHi').replace('{score}', String(score)));
    spawnCelebration();
  } else if (score >= 5) {
    speak(t('speechChallengeMed').replace('{score}', String(score)));
  } else {
    speak(t('speechChallengeLo').replace('{score}', String(score)));
  }
}

$('btnResultClose').addEventListener('click', () => {
  challengeResults.classList.remove('visible');
  flushAfterChallengeResults();
});
$('btnLbReset').addEventListener('click', (e) => {
  e.stopPropagation();
  clearChallengeLeaderboard();
});
$('btnChallengePauseContinue').addEventListener('click', resumeChallenge);
$('btnChallengePauseStop').addEventListener('click', () => {
  const pending = state.challengePendingAction;
  state.challengePendingAction = null;
  if (pending) state.afterChallengeResultsAction = pending;
  endChallenge();
});

/* ════════════════════════════════════════════
   VOICE INPUT
   ════════════════════════════════════════════ */
const dutchNumbers = {
  'nul':0,'een':1,'één':1,'twee':2,'drie':3,'vier':4,'vijf':5,
  'zes':6,'zeven':7,'acht':8,'negen':9,'tien':10,'elf':11,'twaalf':12,
};
const englishNumbers = {
  'zero':0,'one':1,'two':2,'three':3,'four':4,'five':5,
  'six':6,'seven':7,'eight':8,'nine':9,'ten':10,'eleven':11,'twelve':12,
};

let voiceEnableInProgress = false;

function setVoicePermissionBanner() {
  const voiceText = $('voiceText');
  cooldownBar.style.display = 'none';
  voiceBanner.className = 'voice-banner visible state-permission';
  voiceText.textContent = t('voiceMicPrompt');
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert(t('voiceNoSupport'));
    return;
  }
  if (state.voiceEnabled) {
    state.voiceEnabled = false;
    btnVoice.classList.remove('active');
    btnVoice.setAttribute('aria-pressed', 'false');
    voiceBanner.classList.remove('visible');
    cooldownBar.style.display = 'none';
    clearInterval(cooldownInterval);
    stopListening();
    return;
  }
  if (voiceEnableInProgress) return;
  voiceEnableInProgress = true;
  try {
    setVoicePermissionBanner();
    state.voiceEnabled = true;
    btnVoice.classList.add('active');
    btnVoice.setAttribute('aria-pressed', 'true');
    startListening();
    startVoiceCooldown();
  } finally {
    voiceEnableInProgress = false;
  }
}

let cooldownInterval = null;
function startVoiceCooldown() {
  state.voiceReadyAt = Date.now() + VOICE_COOLDOWN_MS;
  setVoiceStatus('cooldown');
  cooldownBar.style.display = 'block';
  cooldownFill.style.width = '100%';

  clearInterval(cooldownInterval);
  cooldownInterval = setInterval(() => {
    const remaining = state.voiceReadyAt - Date.now();
    if (remaining <= 0) {
      clearInterval(cooldownInterval);
      cooldownBar.style.display = 'none';
      if (state.voiceEnabled) setVoiceStatus('listening');
      return;
    }
    const pct = (remaining / VOICE_COOLDOWN_MS) * 100;
    cooldownFill.style.width = pct + '%';
    const secs = Math.ceil(remaining / 1000);
    setVoiceStatus('cooldown', secs);
  }, 80);
}

function setVoiceStatus(mode, extra) {
  const voiceText = $('voiceText');
  voiceBanner.className = 'voice-banner visible state-' + mode;
  if (mode === 'listening') {
    voiceText.textContent = t('voiceListen');
  } else if (mode === 'hearing') {
    voiceText.textContent = extra ? ('🟢 ' + extra) : t('voiceHear');
  } else if (mode === 'cooldown') {
    const secs = typeof extra === 'number' ? extra : Math.ceil(VOICE_COOLDOWN_MS / 1000);
    voiceText.textContent = t('voiceCooldown') + secs;
  }
}

function createRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = localeTag(); rec.continuous = true;
  rec.interimResults = true; rec.maxAlternatives = 5;

  rec.onresult = (e) => {
    if (speechIsBlockingVoiceInput()) return;
    const latest = e.results[e.results.length - 1];
    const inCooldown = Date.now() < state.voiceReadyAt;
    const raw = latest[0].transcript.trim();
    if (raw && !inCooldown) setVoiceStatus('hearing', raw);
    if (!latest.isFinal) return;
    if (inCooldown) return;
    for (let j = 0; j < latest.length; j++) {
      const t = latest[j].transcript.trim().toLowerCase();
      const num = parseSpokenNumber(t);
      if (num !== null && !state.busy) {
        setVoiceStatus('hearing', '' + num);
        handleAnswer(num, { fromVoice: true });
        setTimeout(() => { if (state.voiceEnabled) setVoiceStatus('listening'); }, 1500);
        return;
      }
    }
    setVoiceStatus('listening');
  };
  rec.onspeechstart = () => {
    if (speechIsBlockingVoiceInput()) return;
    if (Date.now() >= state.voiceReadyAt) setVoiceStatus('hearing');
  };
  rec.onspeechend = () => {
    if (speechIsBlockingVoiceInput()) return;
    if (state.voiceEnabled && Date.now() >= state.voiceReadyAt) setVoiceStatus('listening');
  };
  rec.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      state.voiceEnabled = false;
      btnVoice.classList.remove('active');
      btnVoice.setAttribute('aria-pressed', 'false');
      voiceBanner.classList.remove('visible');
      state.recognition = null;
      alert(t('voiceMicDenied'));
      return;
    }
    if (e.error === 'aborted') return;
    if (e.error === 'no-speech' || e.error === 'audio-capture' || e.error === 'network') {
      const delay = e.error === 'audio-capture' ? 500 : e.error === 'network' ? 400 : 280;
      setTimeout(() => attemptVoiceRecStart(rec), delay);
      return;
    }
  };
  rec.onend = () => {
    if (state.voiceEnabled && state.recognition === rec) {
      attemptVoiceRecStart(rec);
    }
  };
  return rec;
}
function startListening() {
  if (state.recognition) return;
  const rec = createRecognition();
  if (!rec) return;
  state.recognition = rec;
  try { rec.start(); } catch(_) {}
}
function stopListening() {
  clearInterval(cooldownInterval);
  cooldownBar.style.display = 'none';
  const rec = state.recognition;
  state.recognition = null;
  if (rec) { try{rec.stop();}catch(_){} }
}
function parseSpokenNumber(text) {
  const d = text.match(/\d+/);
  if (d) { const n = parseInt(d[0]); if (n >= 0 && n <= 12) return n; }
  const words = state.lang === 'en' ? englishNumbers : dutchNumbers;
  for (const [w,v] of Object.entries(words)) { if (text.includes(w)) return v; }
  return null;
}

function toggleDarkMode() {
  document.body.classList.toggle('dark');
  updateThemeButton();
  syncThemeColor();

}

document.addEventListener('keydown', (e) => {
  // Ignore if typing in an input field or if overlay is visible
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (isNavMenuLayout() && topBar.classList.contains('nav-open') && e.key === 'Escape') {
    closeNavMenu();
    e.preventDefault();
    return;
  }
  const autoOv = $('autoConfirmOverlay');
  if (autoOv.classList.contains('visible')) {
    if (e.key === 'Escape') { autoOv.classList.remove('visible'); e.preventDefault(); }
    return;
  }
  const masteryOv = $('masteryOverlay');
  if (masteryOv.classList.contains('visible')) {
    if (e.key === 'Escape' || e.key === 'Enter') { masteryOv.classList.remove('visible'); e.preventDefault(); }
    return;
  }
  if (helpOverlay.classList.contains('visible')) {
    if (e.key === 'Escape' || e.key === 'Enter') { helpOverlay.classList.remove('visible'); e.preventDefault(); }
    return;
  }
  if (statsOverlay.classList.contains('visible')) {
    if (e.key === 'Escape' || e.key === 'Enter') { statsOverlay.classList.remove('visible'); e.preventDefault(); }
    return;
  }
  if (challengePauseOverlay.classList.contains('visible')) {
    if (e.key === 'Escape') { resumeChallenge(); e.preventDefault(); }
    return;
  }
  if (challengeResults.classList.contains('visible')) {
    if (e.key === 'Enter' || e.key === 'Escape') {
      challengeResults.classList.remove('visible');
      flushAfterChallengeResults();
      e.preventDefault();
    }
    return;
  }

  const key = e.key;

  if (key >= '0' && key <= '9') {
    if (state.busy) return;
    e.preventDefault();
    clearTimeout(state.keyTimer);

    state.keyBuffer += key;
    updateSpotWithBuffer();

    const num = parseInt(state.keyBuffer);
    const max = state.activeVisual === 'dice' ? 12 : 10;
    const answerIsDouble = state.answer >= 10;

    if (num > max || state.keyBuffer.length >= 2) {
      submitKeyBuffer();
    } else if (!answerIsDouble) {
      // Answer is single-digit: submit immediately
      submitKeyBuffer();
    } else if (num >= 2) {
      // Answer is double-digit but pressed 2-9: can't form valid double, submit now
      submitKeyBuffer();
    } else {
      // Answer is double-digit and pressed 0 or 1: wait for second digit
      state.keyTimer = setTimeout(submitKeyBuffer, KEY_TIMEOUT_MS);
    }
    return;
  }

  if (key === 'Enter') {
    e.preventDefault();
    if (state.keyBuffer.length > 0 && !state.busy) {
      submitKeyBuffer();
    }
    return;
  }

  if (key === 'Backspace') {
    e.preventDefault();
    clearTimeout(state.keyTimer);
    state.keyBuffer = state.keyBuffer.slice(0, -1);
    updateSpotWithBuffer();
    return;
  }
});

/* ════════════════════════════════════════════
   STATS PANEL (for parents)
   ════════════════════════════════════════════ */
function showStats() {
  const total = state.totalQuestions;
  const incorrect = state.totalIncorrect;
  const totalAnswers = state.totalCorrect + incorrect;
  const answersPerQ = total > 0 ? (totalAnswers / total).toFixed(1) : '0.0';
  let firstTryCount = 0;
  Object.values(state.problemStats).forEach(ps => {
    if (ps.firstTryCorrect) firstTryCount += ps.firstTryCorrect;
  });
  const firstTryPct = total > 0 ? Math.round((firstTryCount / total) * 100) : 0;

  const { mastered, total: comboTotal } = getMasteryProgress(state.activeVisual);

  let html = `
    <div class="stats-grid">
      <div class="stat-item"><span class="stat-value blue">${total}</span><span class="stat-label">${t('statQ')}</span></div>
      <div class="stat-item"><span class="stat-value red">${incorrect}</span><span class="stat-label">${t('statWrong')}</span></div>
      <div class="stat-item"><span class="stat-value ${answersPerQ <= 1.2 ? 'green' : answersPerQ <= 2 ? 'orange' : 'red'}">${answersPerQ}</span><span class="stat-label">${t('statPerQ')}</span></div>
      <div class="stat-item"><span class="stat-value ${firstTryPct >= 80 ? 'green' : firstTryPct >= 50 ? 'orange' : 'red'}">${firstTryPct}%</span><span class="stat-label">${t('statFirstTry')}</span></div>
      <div class="stat-item"><span class="stat-value blue">${mastered}/${comboTotal}</span><span class="stat-label">${t('statMastered')}</span></div>
      <div class="stat-item"><span class="stat-value blue">${totalAnswers}</span><span class="stat-label">${t('statTotalAns')}</span></div>
    </div>`;

  const problems = Object.entries(state.problemStats);
  if (problems.length > 0) {
    const rows = problems.map(([key, ps]) => {
      const avg = Math.round(ps.totalMs / ps.count);
      const attemptsPerQ = ((ps.totalWrong + ps.count) / ps.count).toFixed(1);
      const [a, b] = key.split('+');
      return { label: `${a} + ${b} = ${+a + +b}`, avg, count: ps.count, attemptsPerQ: +attemptsPerQ };
    });
    rows.sort((a, b) => b.avg - a.avg);

    const maxAvg = Math.max(...rows.map(r => r.avg), 1);

    html += `<div class="problem-breakdown"><h3>${t('statsSpeedH3')}</h3>
      <table class="pb-table">
        <tr><th>${t('pbSom')}</th><th>${t('pbKeer')}</th><th>${t('pbGem')}</th><th>${t('pbSnelheid')}</th><th>${t('pbPoging')}</th></tr>`;
    rows.forEach(r => {
      const secs = (r.avg / 1000).toFixed(1);
      const pct = Math.round((r.avg / maxAvg) * 100);
      const cls = r.avg < 4000 ? 'speed-fast' : r.avg < 8000 ? 'speed-med' : 'speed-slow';
      const aCls = r.attemptsPerQ <= 1.2 ? 'green' : r.attemptsPerQ <= 2 ? 'orange' : 'red';
      html += `<tr>
        <td><strong>${r.label}</strong></td>
        <td>${r.count}</td>
        <td>${secs}s</td>
        <td class="bar-cell"><div class="speed-bar ${cls}" style="width:${pct}%"></div></td>
        <td style="color:var(--text-primary)"><span class="${aCls}">${r.attemptsPerQ}</span></td>
      </tr>`;
    });
    html += '</table></div>';
  }

  const lbMarkup = getLeaderboardMarkup(null);
  if (lbMarkup) {
    html += `<div class="leaderboard">${lbMarkup}</div>`;
  }

  const sessions = getAutoSessionHistory();
  if (sessions.length > 0) {
    html += `<div class="auto-session-history"><div class="auto-session-history-header"><h3>${t('autoSessH3')}</h3><button type="button" class="btn-clear-sessions" id="btnClearAutoSessions" title="${t('titleClearAutoSessions')}">${t('btnClearAutoSessions')}</button></div><ul class="auto-session-list">`;
    sessions.slice(0, 10).forEach(s => {
      const when = new Date(s.date).toLocaleString(localeTag(), { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const dur = formatSessionDuration(s.durationMs || 0);
      const up = s.leveledUp ? t('levelUpSuffix') : '';
      const line1 = t('autoSessLine1').replace('{q}', String(s.questionsAnswered)).replace('{ft}', String(s.correctFirstTry)).replace('{wr}', String(s.wrongAttempts)).replace('{up}', up);
      const line2 = t('autoSessLine2').replace('{h0}', String(s.handMasteredStart ?? 0)).replace('{h1}', String(s.handMasteredEnd ?? 0)).replace('{d0}', String(s.diceMasteredStart ?? 0)).replace('{d1}', String(s.diceMasteredEnd ?? 0));
      html += `<li><div class="as-date">${when} · ${dur}</div><div class="as-main">${line1}</div><div class="as-main">${line2}</div></li>`;
    });
    html += '</ul></div>';
  }

  statsGrid.innerHTML = html;
  const clearAutoBtn = $('btnClearAutoSessions');
  if (clearAutoBtn) {
    clearAutoBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearAutoSessionHistory();
      showStats();
    });
  }
  statsOverlay.classList.add('visible');
}

/* ════════════════════════════════════════════
   CHALLENGE LEADERBOARD (localStorage)
   ════════════════════════════════════════════ */

function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch { return []; }
}

function challengeModeEmoji(mode) {
  if (mode === 'dice') return '🎲';
  if (mode === 'numbers') return '🔢';
  if (mode === 'hand') return '🖐️';
  return '';
}

function challengeModeAriaLabel(mode) {
  if (mode === 'dice') return t('nameDice');
  if (mode === 'numbers') return t('nameNumbers');
  if (mode === 'hand') return t('nameHand');
  return '';
}

function saveToLeaderboard(score) {
  const lb = getLeaderboard();
  const mode =
    state.mode === 'dice' || state.mode === 'numbers' || state.mode === 'hand'
      ? state.mode
      : 'hand';
  const entry = {
    score,
    mode,
    date: new Date().toLocaleDateString(localeTag(), { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }),
    id: Date.now(),
  };
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  if (lb.length > LB_MAX_ENTRIES) lb.length = LB_MAX_ENTRIES;
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
  return { entries: lb, currentId: entry.id };
}

function getLeaderboardMarkup(currentId) {
  const lb = getLeaderboard();
  if (lb.length === 0) return '';

  let html = '<h3>' + t('leaderboardH3') + '</h3><ol class="lb-list">';
  lb.forEach((e, i) => {
    const isCurrent = currentId != null && e.id === currentId;
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
    const modeEmoji = challengeModeEmoji(e.mode);
    const modeSpan = modeEmoji
      ? `<span class="lb-mode" role="img" aria-label="${challengeModeAriaLabel(e.mode)}">${modeEmoji}</span>`
      : '';
    html += `<li class="${isCurrent ? 'current' : ''}">
      <span class="lb-left"><span class="lb-rank">${medal}</span>${modeSpan}</span>
      <span class="lb-score">⭐ ${e.score}</span>
      <span class="lb-date">${e.date}</span>
    </li>`;
  });
  html += '</ol>';
  return html;
}

function renderLeaderboard(currentId) {
  leaderboardEl.innerHTML = getLeaderboardMarkup(currentId);
}

function clearChallengeLeaderboard() {
  try { localStorage.removeItem(LB_KEY); } catch (_) {}
  renderLeaderboard(null);
}
