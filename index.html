<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<title>Reken App</title>
<style>
/* ───────── Theme variables ───────── */
:root{
  --bg:#ffffff;
  --bar-bg:rgba(255,255,255,.88);
  --btn-bg:#fff;
  --btn-border:#b0bec5;
  --btn-color:#37474f;
  --text-primary:#37474f;
  --text-secondary:#607d8b;
  --text-muted:#90a4ae;
  --plus-color:#546e7a;
  --shadow:rgba(0,0,0,.08);
  --shadow-md:rgba(0,0,0,.12);
  --card-bg:#fff;
  /* Help overlay section panels (page --bg is white; sections need their own tint like dark mode). */
  --help-section-bg:#e8f4f8;
  /* Hand SVGs: silhouette vs “paper” gaps (must be opaque — transparent would show darker paths below in z-order). */
  --hand-silhouette:#1a1a1a;
  --hand-highlight:var(--bg);
  --hand-stroke:#1a1a1a;
}
body.dark{
  --bg:#1a1a2e;
  --bar-bg:rgba(30,30,50,.92);
  --btn-bg:#2a2a42;
  --btn-border:#4a4a6a;
  --btn-color:#e0e0e0;
  --text-primary:#e0e0e0;
  --text-secondary:#aab0c0;
  --text-muted:#6a6a8a;
  --plus-color:#9a9abe;
  --shadow:rgba(0,0,0,.3);
  --shadow-md:rgba(0,0,0,.4);
  --card-bg:#2a2a42;
  --help-section-bg:#1a1a2e;
  --hand-silhouette:#4a4a62;
  --hand-highlight:var(--bg);
  --hand-stroke:rgba(0,0,0,.42);
}

/* ───────── Reset & Base ───────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{
  font-size:16px;-webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  /* Lock to viewport so flex layout can shrink the question area (no document scroll) */
  min-height:100%;
  min-height:100dvh;
  height:100dvh;
  max-height:100dvh;
  min-height:-webkit-fill-available;
  display:flex;flex-direction:column;align-items:stretch;
  width:100%;
  max-width:100vw;
  overflow-x:hidden;
  overflow-y:hidden;
  overscroll-behavior-y:none;
  user-select:none;
  -webkit-user-select:none;
  transition:background .3s;
}

/* Main game column: centered, responsive width */
.app-shell{
  flex:1;display:flex;flex-direction:column;align-items:stretch;
  min-height:0;width:100%;max-width:min(100%,960px);
  margin:0 auto;
  padding:0 max(12px, env(safe-area-inset-left, 0px)) 0 max(12px, env(safe-area-inset-right, 0px));
  box-sizing:border-box;
}

/* ───────── Top bar ───────── */
.top-bar{
  flex-shrink:0;
  width:100%;max-width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:max(10px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) 10px max(16px, env(safe-area-inset-left, 0px));
  /* Solid-ish bar (no backdrop-filter): filter/blur on an ancestor breaks position:fixed for the mobile drawer */
  background:var(--bar-bg);
  position:sticky;top:0;z-index:40;
  transition:background .3s;
  gap:10px;
  overflow:visible;
}
.top-bar-main{
  display:flex;align-items:center;justify-content:space-between;
  flex:1;min-width:0;gap:10px;
}
.score{font-size:1rem;color:var(--text-secondary);font-weight:600;letter-spacing:.3px;cursor:pointer;flex-shrink:0}
.score .correct{color:#43a047}
.score .incorrect{color:#e53935}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.icon-btn{
  width:52px;min-height:52px;border:none;border-radius:14px;
  background:var(--btn-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1px;
  font-size:1.6rem;box-shadow:0 2px 6px var(--shadow);
  transition:transform .15s,box-shadow .15s,background .3s;
  padding:4px 2px;
  flex-shrink:0;touch-action:manipulation;-webkit-touch-callout:none;
}
.icon-btn .btn-label{
  font-size:.5rem;font-weight:600;color:var(--text-muted);
  line-height:1;letter-spacing:.2px;white-space:nowrap;
}
/* Voice: experimental badge on menu button */
#btnVoice.icon-btn-voice{position:relative}
.voice-btn-icon-wrap{
  position:relative;display:inline-flex;align-items:center;justify-content:center;line-height:1;
}
#btnVoice .voice-exp-badge{
  position:absolute;top:-4px;right:-10px;
  font-size:max(6px,0.42rem);font-weight:800;letter-spacing:.02em;
  color:#bf360c;background:linear-gradient(180deg,#fff8e1,#ffecb3);
  border:1px solid #ff9800;border-radius:4px;padding:1px 3px;line-height:1;
  box-shadow:0 1px 2px rgba(0,0,0,.12);
  pointer-events:none;
}
body.dark #btnVoice .voice-exp-badge{
  color:#ffcc80;background:linear-gradient(180deg,#3e2723,#4e342e);
  border-color:#ff8f00;
}
/* Language: compact label (NL / EN) */
#btnLang.icon-btn.icon-btn-lang{
  flex-shrink:0;min-width:4.2rem;width:auto;max-width:none;padding:6px 8px;gap:4px;
  flex-direction:row;justify-content:center;align-items:center;
}
#btnLang .btn-lang-text{
  font-size:.72rem;font-weight:800;color:var(--text-secondary);
  letter-spacing:.02em;white-space:nowrap;line-height:1.1;
}
.icon-btn:hover{transform:scale(1.08);box-shadow:0 4px 12px var(--shadow-md)}
.icon-btn:disabled,.icon-btn.disabled{
  opacity:.45;cursor:not-allowed;pointer-events:none;
  transform:none;box-shadow:0 2px 6px var(--shadow);
}
.icon-btn.active{background:#bbdefb;box-shadow:0 0 0 3px #42a5f5}
body.dark .icon-btn.active{background:#3a3a6a;box-shadow:0 0 0 3px #5c6bc0}
/* Voice on: clear blue “mic active” state */
#btnVoice.icon-btn.active{
  background:linear-gradient(180deg,#e3f2fd,#90caf9);
  box-shadow:0 0 0 3px #1976d2,0 4px 14px rgba(25,118,210,.35);
  color:#0d47a1;
}
#btnVoice.icon-btn.active .btn-label{color:#1565c0}
body.dark #btnVoice.icon-btn.active{
  background:linear-gradient(180deg,#1a237e,#283593);
  box-shadow:0 0 0 3px #42a5f5,0 4px 14px rgba(66,165,245,.25);
  color:#e3f2fd;
}
body.dark #btnVoice.icon-btn.active .btn-label{color:#90caf9}
.reset-btn{
  border:none;border-radius:12px;
  background:var(--btn-bg);cursor:pointer;
  font-size:.9rem;color:var(--text-muted);font-weight:600;
  padding:10px 16px;
  box-shadow:0 2px 6px var(--shadow);
  transition:transform .15s,box-shadow .15s,background .3s,color .3s;
  white-space:nowrap;
  flex-shrink:0;touch-action:manipulation;
}
.reset-btn:hover{transform:scale(1.05);color:var(--text-secondary)}

/* Mobile / narrow tablet nav: hamburger + drawer (see @media max-width:900px) */
.nav-menu-btn{
  display:none;align-items:center;justify-content:center;
  width:48px;min-height:48px;padding:0;border:none;border-radius:14px;
  background:var(--btn-bg);cursor:pointer;flex-shrink:0;
  font-size:1.5rem;line-height:1;color:var(--text-primary);
  box-shadow:0 2px 6px var(--shadow);
  touch-action:manipulation;
}
.nav-menu-btn .nav-menu-icon{display:block;line-height:1}
.nav-menu-btn .nav-menu-close{display:none}
.top-bar.nav-open .nav-menu-btn .nav-menu-open{display:none}
.top-bar.nav-open .nav-menu-btn .nav-menu-close{display:block}
.nav-backdrop{display:none}

/* ───────── Stats panel (for parents) ───────── */
.stats-overlay{
  display:none;position:fixed;inset:0;z-index:5000;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  padding:max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.stats-overlay.visible{display:flex}
.stats-card{
  background:var(--help-section-bg);border-radius:24px;overflow:hidden;
  max-width:420px;width:min(92vw, 420px);box-shadow:0 8px 40px rgba(0,0,0,.2);
  color:var(--text-primary);
}
.stats-card-inner{
  max-height:85vh;
  max-height:min(85vh, calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 24px));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:28px 32px;
}
.stats-card h2{font-size:1.3rem;margin-bottom:14px;text-align:center}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.stat-item{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:14px;background:var(--card-bg)}
.stat-value{font-size:1.6rem;font-weight:800}
.stat-label{font-size:.72rem;color:var(--text-muted);text-align:center;margin-top:2px}
.stat-value.green{color:#43a047}
.stat-value.red{color:#e53935}
.stat-value.blue{color:#42a5f5}
.stat-value.orange{color:#ffa726}
.stats-card .close-stats{
  display:block;margin:16px auto 0;padding:10px 28px;
  border:none;border-radius:12px;background:#42a5f5;color:#fff;
  font-size:1rem;font-weight:700;cursor:pointer;
}
.problem-breakdown{
  margin-top:16px;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;
  padding:14px 16px;border-radius:14px;background:var(--card-bg);
  border:1px solid var(--btn-border);
}
.problem-breakdown h3{font-size:.85rem;color:var(--text-muted);margin-bottom:8px;text-align:center}
.pb-table{width:100%;min-width:280px;border-collapse:collapse;font-size:.8rem}
.pb-table th{
  text-align:center;padding:6px 4px;color:var(--text-muted);font-weight:600;
  border-bottom:1px solid var(--btn-border);font-size:.7rem;
}
.pb-table td{text-align:center;padding:5px 4px;color:var(--text-primary)}
.pb-table tr:nth-child(odd) td{background:var(--help-section-bg);border-radius:6px}
.auto-session-history{
  margin-top:18px;text-align:left;padding:14px 16px;border-radius:14px;background:var(--card-bg);
  border:1px solid var(--btn-border);
}
.auto-session-history-header{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.auto-session-history-header h3{font-size:.85rem;color:var(--text-muted);margin:0;flex:1;min-width:0;text-align:center}
.btn-clear-sessions{
  flex-shrink:0;padding:5px 10px;font-size:.68rem;font-weight:600;
  border:1px solid var(--btn-border);border-radius:8px;background:var(--card-bg);
  color:var(--text-muted);cursor:pointer;line-height:1.2;
}
.btn-clear-sessions:hover{color:#e53935;border-color:rgba(229,57,53,.45)}
.auto-session-list{list-style:none;padding:0;margin:0;font-size:.78rem}
.auto-session-list li{
  padding:8px 10px;margin-bottom:6px;border-radius:10px;background:var(--card-bg);
  border:1px solid var(--btn-border);line-height:1.35;
}
.auto-session-list .as-date{color:var(--text-muted);font-size:.7rem}
.auto-session-list .as-main{color:var(--text-primary)}
.pb-table .bar-cell{position:relative;width:60px}
.speed-bar{height:8px;border-radius:4px;min-width:2px}
.speed-fast{background:#43a047}
.speed-med{background:#ffa726}
.speed-slow{background:#e53935}

/* ───────── Help overlay (for parents) ───────── */
.help-overlay{
  display:none;position:fixed;inset:0;z-index:5010;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  padding:max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.help-overlay.visible{display:flex}
.help-card{
  background:var(--help-section-bg);border-radius:24px;overflow:hidden;
  max-width:520px;width:min(94vw, 520px);box-shadow:0 8px 40px rgba(0,0,0,.2);
  color:var(--text-primary);
}
.help-card-inner{
  max-height:85vh;
  max-height:min(85vh, calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 24px));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:28px 28px 20px;
}
.help-card h2{font-size:1.3rem;margin-bottom:16px;text-align:center}
.help-card h3{font-size:.95rem;margin:18px 0 6px;color:#42a5f5}
body.dark .help-card h3{color:#90caf9}
.help-card p,.help-card li{font-size:.82rem;line-height:1.55;color:var(--text-primary)}
.help-card ul{padding-left:18px;margin:4px 0 10px}
.help-card li{margin-bottom:4px}
.help-card .help-section{
  background:var(--card-bg);border-radius:14px;padding:14px 16px;margin-bottom:12px;
  border:1px solid var(--btn-border);
}
.help-feature-flags{margin-bottom:12px}
.help-feature-flags .help-toggle{
  display:flex;align-items:flex-start;gap:10px;margin:10px 0;font-size:.82rem;line-height:1.45;
  cursor:pointer;color:var(--text-primary);
}
.help-feature-flags .help-toggle input{
  margin-top:3px;width:18px;height:18px;accent-color:#42a5f5;flex-shrink:0;cursor:pointer;
}
.help-ff-note{font-size:.72rem;color:var(--text-muted);margin:8px 0 0;line-height:1.4}
.help-ff-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.help-tts-wrap{margin-top:14px;padding-top:12px;border-top:1px solid var(--btn-border)}
.help-tts-heading{font-size:.78rem;font-weight:600;color:var(--text-secondary);margin:0 0 8px}
.help-tts-seg{display:flex;gap:8px;flex-wrap:wrap}
.help-tts-btn{
  flex:1;min-width:min(100%,120px);padding:10px 14px;border-radius:12px;
  border:2px solid var(--btn-border);background:var(--card-bg);
  font-size:.82rem;font-weight:700;cursor:pointer;touch-action:manipulation;
  color:var(--text-primary);transition:border-color .15s,background .15s;
}
.help-tts-btn[aria-pressed="true"]{
  border-color:#42a5f5;background:#e3f2fd;color:#1565c0;
}
body.dark .help-tts-btn[aria-pressed="true"]{
  border-color:#5c6bc0;background:#2a2a4a;color:#90caf9;
}
.help-tts-btn:active{transform:scale(.98)}
.help-preview-btn{
  flex:1;min-width:min(100%,132px);padding:9px 12px;border-radius:10px;
  border:1px solid var(--btn-border);background:var(--card-bg);
  font-size:.76rem;font-weight:600;color:#1565c0;cursor:pointer;touch-action:manipulation;
  line-height:1.25;
}
body.dark .help-preview-btn{color:#90caf9}
.help-preview-btn:active{transform:scale(.98)}
.help-github{
  text-align:center;margin:14px 0 4px;font-size:.82rem;line-height:1.4;
}
.help-github-link{
  color:#1565c0;font-weight:600;text-decoration:none;
  border-bottom:1px solid rgba(21,101,192,.35);transition:border-color .15s,color .15s;
}
.help-github-link:hover{border-bottom-color:#1565c0}
.help-github-link:focus-visible{
  outline:2px solid #42a5f5;outline-offset:3px;border-radius:4px;border-bottom-color:#1565c0;
}
body.dark .help-github-link{color:#90caf9;border-bottom-color:rgba(144,202,249,.4)}
body.dark .help-github-link:hover{border-bottom-color:#90caf9}
body.dark .help-github-link:focus-visible{outline-color:#90caf9}
.help-card .close-help{
  display:block;margin:16px auto 0;padding:10px 28px;
  border:none;border-radius:12px;background:#42a5f5;color:#fff;
  font-size:1rem;font-weight:700;cursor:pointer;
}

/* ───────── Leaderboard in challenge results ───────── */
.leaderboard{
  margin-top:14px;text-align:left;width:100%;
  padding:12px;border-radius:14px;background:var(--card-bg);
  border:1px solid var(--btn-border);
}
.leaderboard h3{font-size:.85rem;color:var(--text-muted);margin-bottom:6px;text-align:center}
.lb-list{list-style:none;max-height:160px;overflow-y:auto}
.lb-list li{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;border-radius:8px;font-size:.85rem;
  color:var(--text-primary);
}
.lb-list li:nth-child(odd){background:var(--help-section-bg)}
.lb-list li .lb-left{display:flex;align-items:center;gap:6px;min-width:0;flex-shrink:0}
.lb-list li .lb-rank{font-weight:700;min-width:22px}
.lb-list li .lb-mode{font-size:1.05rem;line-height:1;width:1.3em;text-align:center;flex-shrink:0}
.lb-list li .lb-score{font-weight:800;color:#43a047}
.lb-list li .lb-date{color:var(--text-muted);font-size:.7rem;text-align:right;flex-shrink:0;margin-left:8px}
.lb-list li.current{background:rgba(66,165,245,.15);font-weight:700}

/* ───────── Progress bar ───────── */
.progress-bar-wrap{
  flex-shrink:0;
  width:100%;max-width:min(92vw,760px);margin:0 auto;
  padding:8px max(20px, env(safe-area-inset-left, 0px)) 10px max(20px, env(safe-area-inset-right, 0px));
  display:none;
}
.progress-bar-wrap.visible{display:block}
.progress-label{
  font-size:.88rem;color:var(--text-muted);text-align:center;
  margin-bottom:6px;font-weight:600;letter-spacing:.02em;
}
.progress-track{
  width:100%;height:16px;border-radius:8px;
  background:rgba(0,0,0,.08);overflow:hidden;
}
body.dark .progress-track{background:rgba(255,255,255,.08)}
.progress-fill{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,#66bb6a,#43a047);
  transition:width .4s ease;
}
.progress-fill.high{background:linear-gradient(90deg,#43a047,#2e7d32)}

/* ───────── Monkey-click warning banner ───────── */
.monkey-banner{
  flex-shrink:0;
  display:none;
  width:90%;max-width:min(460px, calc(100vw - 24px));
  margin:8px auto 0;padding:14px 20px;
  border-radius:16px;
  background:#fff3e0;border:2px solid #ff9800;
  text-align:center;
  font-size:1.2rem;font-weight:700;color:#e65100;
  animation:monkeyShake .4s ease;
  z-index:50;
}
body.dark .monkey-banner{background:#3e2723;border-color:#ff6f00;color:#ffab40}
.monkey-banner.visible{display:block}
@keyframes monkeyShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* ───────── Voice banner ───────── */
.voice-banner{
  flex-shrink:0;
  display:none;
  width:100%;max-width:500px;
  flex-direction:column;align-items:center;gap:6px;
  padding:12px max(20px, env(safe-area-inset-left, 0px)) 12px max(20px, env(safe-area-inset-right, 0px));
  margin:4px auto 0;
  border-radius:16px;
  font-size:1.1rem;font-weight:700;
  transition:background .25s,color .25s,transform .2s;
}
.voice-banner.visible{display:flex}
/* Listening state */
.voice-banner.state-listening{
  background:rgba(66,165,245,.14);color:#1565c0;
}
/* Hearing state */
.voice-banner.state-hearing{
  background:rgba(76,175,80,.18);color:#2e7d32;
  transform:scale(1.03);
}
/* Cooldown state */
.voice-banner.state-cooldown{
  background:rgba(255,167,38,.14);color:#e65100;
}
.voice-banner.state-permission{
  background:rgba(33,150,243,.16);color:#0d47a1;
  border:2px solid rgba(25,118,210,.45);
}
body.dark .voice-banner.state-permission{
  background:rgba(25,118,210,.2);color:#90caf9;
  border-color:rgba(100,181,246,.5);
}
.voice-banner.state-permission .pulse-dot{
  background:#1976d2;animation:voicePulse 1.2s ease-in-out infinite;
}
body.dark .voice-banner.state-permission .pulse-dot{background:#42a5f5}
.voice-banner .banner-row{
  display:flex;align-items:center;gap:10px;
}
.voice-banner .pulse-dot{
  width:14px;height:14px;border-radius:50%;
  flex-shrink:0;
}
.voice-banner.state-listening .pulse-dot{
  background:#e53935;animation:voicePulse 1s ease-in-out infinite;
}
.voice-banner.state-hearing .pulse-dot{background:#43a047;animation:none}
.voice-banner.state-cooldown .pulse-dot{background:#ffa726;animation:none;opacity:.5}
@keyframes voicePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* Countdown bar */
.cooldown-bar{
  width:100%;height:6px;border-radius:3px;
  background:rgba(0,0,0,.1);overflow:hidden;
}
.cooldown-bar-fill{
  height:100%;border-radius:3px;
  background:#ffa726;
  transition:width .1s linear;
}

/* ───────── Challenge bar ───────── */
.challenge-bar{
  flex-shrink:0;
  display:none;width:100%;max-width:500px;
  flex-direction:column;align-items:center;gap:6px;
  padding:10px max(20px, env(safe-area-inset-left, 0px)) 10px max(20px, env(safe-area-inset-right, 0px));
  margin:4px auto 0;
  border-radius:14px;
  background:linear-gradient(135deg,#e3f2fd,#fff3e0);
  font-weight:700;font-size:1rem;color:#37474f;
}
body.dark .challenge-bar{background:linear-gradient(135deg,#0d47a155,#e6510033)}
.challenge-bar.visible{display:flex}
.challenge-bar .timer-row{
  display:flex;align-items:center;gap:10px;width:100%;
}
.challenge-bar .challenge-timer-icon{
  font-size:1.45rem;line-height:1;flex-shrink:0;
}
.challenge-bar .timer-text{font-size:1.8rem;min-width:44px;text-align:center}
.challenge-bar .timer-track{
  flex:1;height:10px;border-radius:5px;background:rgba(0,0,0,.1);overflow:hidden;
}
body.dark .challenge-bar .timer-track{background:rgba(255,255,255,.12)}
.challenge-bar .timer-fill{
  height:100%;border-radius:5px;
  background:linear-gradient(90deg,#0277bd,#29b6f6,#4fc3f7);
  transition:width .25s linear;
}
.challenge-bar .timer-fill.warning{background:linear-gradient(90deg,#e65100,#ff9800,#ffcc80)}
.challenge-bar .challenge-score{font-size:.9rem;color:var(--text-secondary)}

/* Challenge results overlay */
.challenge-results{
  display:none;position:fixed;inset:0;z-index:4990;
  background:rgba(0,0,0,.5);
  align-items:center;justify-content:center;
  padding:max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.challenge-results.visible{display:flex}
.challenge-results-card{
  background:var(--help-section-bg);border-radius:24px;padding:32px 40px;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);
  max-width:340px;width:min(90vw, 340px);
  max-height:90vh;
  max-height:min(90vh, calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 24px));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.challenge-results-card .trophy{font-size:4rem;margin-bottom:8px}
.challenge-results-card .result-num{font-size:3rem;font-weight:800;color:#43a047}
.challenge-results-card .result-label{font-size:1rem;color:var(--text-secondary);margin-bottom:16px}
.challenge-results-hint{
  font-size:.78rem;color:var(--text-muted);line-height:1.35;margin:12px 0 0;
  text-align:center;max-width:100%;
}
.challenge-results-actions{
  display:flex;flex-direction:row;align-items:stretch;justify-content:center;
  gap:10px;width:100%;margin-top:14px;
}
.challenge-result-btn{
  flex:1;min-width:0;min-height:48px;padding:12px 14px;border-radius:14px;
  font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;
  display:inline-flex;align-items:center;justify-content:center;text-align:center;
  line-height:1.2;
}
.challenge-result-btn--primary{
  border:none;background:#42a5f5;color:#fff;
  box-shadow:0 2px 8px rgba(66,165,245,.35);
}
.challenge-result-btn--primary:active{transform:scale(.98)}
.challenge-result-btn--secondary{
  border:2px solid var(--btn-border);background:var(--btn-bg);color:var(--text-secondary);
}
.challenge-result-btn--secondary:active{transform:scale(.98)}
body.dark .challenge-result-btn--secondary{background:var(--btn-bg);color:var(--text-secondary)}

/* Challenge pause (timer frozen until continue or stop) */
.challenge-pause-overlay{
  display:none;position:fixed;inset:0;z-index:10050;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  padding:max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.challenge-pause-overlay.visible{display:flex}
.challenge-pause-card{
  background:var(--help-section-bg);border-radius:20px;padding:24px 22px;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);
  max-width:320px;width:min(90vw, 320px);
}
.challenge-pause-card p{margin:0 0 16px;font-size:1.05rem;color:var(--text-primary);line-height:1.35}
.challenge-pause-actions{display:flex;flex-direction:column;gap:10px}
.challenge-pause-actions .challenge-result-btn{min-height:48px}

/* ───────── Question area ───────── */
.question-area{
  flex:1 1 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;max-width:800px;margin:0 auto;
  padding:12px max(12px, env(safe-area-inset-left, 0px)) 0 max(12px, env(safe-area-inset-right, 0px));
  gap:8px;
  min-height:0;
  overflow:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.visual-row{
  display:flex;align-items:center;justify-content:center;
  gap:20px;flex-wrap:nowrap;
  width:100%;
  max-width:100%;
}
.visual-row .plus{font-size:4rem;font-weight:700;color:var(--plus-color);line-height:1}
.visual-row .equals{font-size:4rem;font-weight:700;color:var(--plus-color);line-height:1}

.answer-spot{
  font-size:5.5rem;font-weight:800;color:#ffa726;
  line-height:1;min-width:80px;text-align:center;
  transition:color .2s;
}
.answer-spot.waiting{animation:pulse 1.2s ease-in-out infinite}
.answer-spot.typing{color:#42a5f5;animation:typeGlow 1s ease-in-out infinite}
@keyframes typeGlow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.06)}}
.answer-spot.result-correct{color:#43a047;animation:popBig .45s ease}
.answer-spot.result-incorrect{color:#e53935;animation:shake .35s ease}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes popBig{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes shake{
  0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
}

/* Hand visual */
.hand-visual{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0}
.hand-canvas,.hand-svg-wrap.hand-canvas{
  width:150px;height:190px;max-height:190px;border-radius:12px;
  box-sizing:border-box;flex-shrink:0
}
.hand-svg-wrap.hand-canvas{display:flex;align-items:center;justify-content:center;overflow:hidden}
.hand-inline-svg{width:100%;height:100%;max-height:100%;display:block;vertical-align:top;object-fit:contain}
.hand-canvas.mirrored,.hand-svg-wrap.hand-canvas.mirrored{transform:scaleX(-1)}
.hand-label{font-size:2.4rem;font-weight:700;line-height:1;color:var(--text-primary);margin-top:2px}

/* Dice visual */
.dice-svg{width:130px;height:130px}
.dice-label{font-size:2.4rem;font-weight:700;color:var(--text-primary);text-align:center}

/* Number-only visual */
.num-visual{display:flex;align-items:center;justify-content:center;
  width:130px;height:130px;border-radius:24px;
  background:var(--card-bg);border:3px solid var(--btn-border);
  box-shadow:0 4px 12px var(--shadow);font-size:5rem;font-weight:800;color:var(--text-primary);
  transition:background .3s,border-color .3s}

/* Phones / narrow width: one equation row, scaled visuals (e.g. 414×896) */
@media (max-width: 520px) {
  .visual-row {
    flex-wrap: nowrap;
    gap: clamp(3px, 1.2vw, 10px);
    justify-content: center;
    align-items: center;
    max-width: 100%;
  }
  .hand-canvas, .hand-svg-wrap.hand-canvas {
    width: clamp(70px, 17vw, 108px);
    height: auto;
    max-height: calc(190 / 150 * clamp(70px, 17vw, 108px));
    aspect-ratio: 150 / 190;
  }
  .dice-svg {
    width: clamp(62px, 15vw, 96px);
    height: auto;
    aspect-ratio: 1;
  }
  .num-visual {
    width: clamp(62px, 15vw, 96px);
    height: clamp(62px, 15vw, 96px);
    font-size: clamp(1.85rem, 7.5vw, 3rem);
    border-radius: 16px;
  }
  .visual-row .plus,
  .visual-row .equals {
    font-size: clamp(1.45rem, 5.5vw, 2.4rem);
  }
  .answer-spot {
    font-size: clamp(1.85rem, 8.5vw, 3.4rem);
    min-width: 0.45em;
  }
  .hand-label,
  .dice-label {
    font-size: clamp(1.15rem, 4vw, 1.85rem);
  }
}

/* Tall narrow phones (e.g. 430×932): vw-only scaling stays tiny; use extra height + trim chrome */
@media (max-width: 480px) and (min-height: 780px) {
  .question-area {
    padding-top: 8px;
    padding-bottom: 2px;
    gap: 6px;
  }
  .progress-bar-wrap {
    padding-top: 4px;
    padding-bottom: 6px;
  }
  .progress-label {
    margin-bottom: 4px;
  }
  .visual-row {
    gap: clamp(4px, 1.8vw, 12px);
  }
  .hand-canvas, .hand-svg-wrap.hand-canvas {
    width: clamp(92px, 22vw, 120px);
    height: auto;
    max-height: calc(190 / 150 * clamp(92px, 22vw, 120px));
    aspect-ratio: 150 / 190;
  }
  .dice-svg {
    width: clamp(84px, 20vw, 112px);
    height: auto;
    aspect-ratio: 1;
  }
  .num-visual {
    width: clamp(84px, 20vw, 112px);
    height: clamp(84px, 20vw, 112px);
    font-size: clamp(2.2rem, 8vw, 3.6rem);
    border-radius: 18px;
  }
  .visual-row .plus,
  .visual-row .equals {
    font-size: clamp(1.65rem, 6vw, 2.75rem);
  }
  .answer-spot {
    font-size: clamp(2.2rem, 9.5vw, 4rem);
    min-width: 0.35em;
  }
  .hand-label,
  .dice-label {
    font-size: clamp(1.25rem, 4.2vw, 2rem);
  }
}
@media (max-width: 340px) {
  .visual-row {
    flex-wrap: wrap;
    row-gap: 6px;
    justify-content: center;
  }
}

/* Mastery celebration overlay */
.mastery-overlay{
  display:none;position:fixed;inset:0;z-index:4970;
  background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  padding:max(16px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) max(16px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.mastery-overlay.visible{display:flex}
.popup-celebrate-panel{
  background:var(--help-section-bg);border:1px solid var(--btn-border);
  border-radius:22px;padding:28px 24px;
  max-width:380px;width:min(90vw,380px);text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.22);
}
.mastery-stars{font-size:4rem;animation:masteryPop 1s ease}
.mastery-title{font-size:2rem;font-weight:800;color:#f9a825;text-align:center;
  animation:levelFadeIn .6s ease .2s both}
.mastery-sub{font-size:1.1rem;color:var(--text-secondary);text-align:center;
  animation:levelFadeIn .6s ease .4s both}
.mastery-btn{margin-top:8px;padding:14px 36px;border:none;border-radius:16px;
  background:#66bb6a;color:#fff;font-size:1.3rem;font-weight:700;cursor:pointer;
  animation:levelFadeIn .6s ease .6s both;touch-action:manipulation}
.mastery-btn:active{transform:scale(.95)}
@keyframes masteryPop{
  0%{transform:scale(0) rotate(-30deg);opacity:0}
  50%{transform:scale(1.4) rotate(10deg);opacity:1}
  100%{transform:scale(1) rotate(0deg)}
}

/* ───────── Answer buttons ───────── */
.answer-area{
  flex-shrink:0;
  width:100%;max-width:700px;margin:0 auto;
  padding:16px max(16px, env(safe-area-inset-left, 0px)) calc(28px + env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-right, 0px));
}
@media (max-width:768px){
  .answer-area{
    position:sticky;bottom:0;z-index:8;
    margin-top:auto;
    max-width:100%;
    background:var(--bg);
    border-top:1px solid var(--btn-border);
    border-radius:20px 20px 0 0;
    padding-top:12px;
    box-shadow:0 -8px 28px rgba(0,0,0,.06);
  }
  body.dark .answer-area{box-shadow:0 -8px 28px rgba(0,0,0,.25)}
}
@media (max-width: 480px) and (min-height: 780px) {
  .answer-area {
    padding-top: 8px;
    padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
  }
}
.answer-grid{display:flex;flex-direction:column;align-items:center;gap:12px}
.answer-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}

.answer-btn{
  width:82px;height:82px;
  border:3px solid var(--btn-border);border-radius:20px;
  background:var(--btn-bg);
  font-size:2.2rem;font-weight:700;color:var(--btn-color);
  cursor:pointer;touch-action:manipulation;
  transition:transform .12s,background .2s,border-color .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 8px var(--shadow);
}
.answer-btn:hover{transform:scale(1.06);border-color:var(--text-muted)}
.answer-btn:active{transform:scale(.96)}
.answer-btn.correct-flash{
  background:#a5d6a7 !important;border-color:#43a047 !important;
  animation:popBtn .4s ease;box-shadow:0 0 20px rgba(67,160,71,.35);
}
.answer-btn.incorrect-flash{
  background:#ef9a9a !important;border-color:#e53935 !important;
  animation:shake .35s ease;
}
.answer-btn.highlight-correct{
  background:#fff9c4 !important;border-color:#ffa726 !important;
  box-shadow:0 0 18px rgba(255,167,38,.4);transform:scale(1.1);
}
.answer-btn:disabled{pointer-events:none;opacity:.85}
@keyframes popBtn{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ───────── Celebration ───────── */
.celebration{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.confetti{
  position:absolute;width:10px;height:10px;border-radius:2px;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

/* ───────── Mode-switch animation ───────── */
.visual-row.switching{animation:modeSwitch .5s ease}
@keyframes modeSwitch{
  0%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}
}

/* ───────── Level-up overlay ───────── */
.levelup-overlay{
  display:none;position:fixed;inset:0;z-index:4960;
  background:rgba(0,0,0,.55);
  align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  padding:max(16px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) max(16px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.levelup-overlay.visible{display:flex}

/* ───────── Auto-mode confirm overlay ───────── */
.auto-confirm-overlay{
  display:none;position:fixed;inset:0;z-index:4980;
  background:rgba(0,0,0,.55);
  align-items:center;justify-content:center;
  padding:max(16px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) max(16px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.auto-confirm-overlay.visible{display:flex}
.auto-confirm-card{
  background:var(--help-section-bg);border-radius:20px;padding:24px 22px;
  max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2);
  text-align:center;
}
.auto-confirm-icon{font-size:3.5rem;margin-bottom:8px}
.auto-confirm-title{font-size:1.35rem;font-weight:800;color:var(--text-primary);margin-bottom:10px}
.auto-confirm-text{font-size:.95rem;color:var(--text-secondary);line-height:1.45;margin-bottom:18px}
.auto-confirm-btns{display:flex;flex-direction:column;gap:10px}
.auto-confirm-btns button{
  border:none;border-radius:14px;padding:14px 18px;font-size:1.05rem;font-weight:700;
  cursor:pointer;touch-action:manipulation;
}
.btn-auto-fresh{background:#ef5350;color:#fff}
.btn-auto-continue{background:#42a5f5;color:#fff}
.btn-auto-cancel{
  display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg, var(--btn-bg) 0%, var(--bg) 100%);
  color:var(--text-primary);border:2px solid var(--btn-border);
  font-weight:800;letter-spacing:.02em;
  box-shadow:0 2px 10px var(--shadow),inset 0 1px 0 rgba(255,255,255,.06);
  min-height:52px;
}
body.dark .btn-auto-cancel{
  background:linear-gradient(180deg,#36365a 0%,#2a2a42 100%);
  box-shadow:0 2px 12px var(--shadow-md),inset 0 1px 0 rgba(255,255,255,.08);
  border-color:#6a6a9a;
}
.btn-auto-cancel::before{
  content:'←';font-size:1.35rem;line-height:1;font-weight:900;opacity:.9;
}
.auto-confirm-btns .btn-auto-continue{font-size:1rem}
.auto-confirm-btns .btn-auto-fresh{font-size:.95rem}
.auto-confirm-btns .btn-auto-cancel{font-size:1rem}
.levelup-overlay .popup-celebrate-panel{display:flex;flex-direction:column;align-items:center;gap:12px}
.mastery-overlay .popup-celebrate-panel{display:flex;flex-direction:column;align-items:center;gap:16px}
.levelup-icon{font-size:6rem;animation:levelBounce .8s ease}
.levelup-text{
  font-size:1.6rem;font-weight:800;color:var(--text-primary);text-align:center;
  animation:levelFadeIn .6s ease .2s both;
}
.levelup-sub{
  font-size:1rem;color:var(--text-secondary);text-align:center;
  animation:levelFadeIn .6s ease .4s both;
}
@keyframes levelBounce{
  0%{transform:scale(0) rotate(-20deg);opacity:0}
  50%{transform:scale(1.3) rotate(5deg);opacity:1}
  100%{transform:scale(1) rotate(0deg)}
}
@keyframes levelFadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

/* Narrow / tablet (incl. ~820×1180): controls in slide-in drawer — avoids overlap with score / stats */
@media (max-width: 900px) {
  .nav-menu-btn {
    display: inline-flex;
    position: relative;
    /* Above dimmer + drawer so ☰/✕ stays tappable */
    z-index: 5;
  }
  .top-bar-main {
    position: relative;
    flex: 1;
    min-width: 0;
    width: auto;
    /* Keeps score + dimmer stacking self-contained vs drawer + menu button */
    isolation: isolate;
  }
  .top-bar .nav-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 0;
    background: rgba(0, 0, 0, 0.45);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s;
    pointer-events: none;
  }
  .top-bar.nav-open .nav-backdrop {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  .top-bar {
    position: relative;
    /* Below modal overlays (stats/help use z-index 5xxx) */
    z-index: 120;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar .controls {
    position: fixed;
    top: 0;
    right: 0;
    left: auto;
    width: min(300px, 88vw);
    max-width: 100%;
    height: 100vh;
    height: 100dvh;
    max-height: 100vh;
    max-height: 100dvh;
    min-height: 0;
    flex: none;
    flex-direction: column;
    flex-wrap: nowrap;
    align-items: stretch;
    align-content: flex-start;
    justify-content: flex-start;
    gap: 10px;
    margin: 0;
    padding: max(14px, env(safe-area-inset-top, 0px)) 14px max(20px, env(safe-area-inset-bottom, 0px)) 14px;
    overflow-x: hidden;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    background: var(--card-bg);
    box-shadow: -6px 0 28px rgba(0, 0, 0, 0.18);
    transform: translateX(100%);
    transition: transform 0.28s ease;
    z-index: 3;
  }
  .top-bar.nav-open .controls {
    transform: translateX(0);
  }
  .top-bar .controls .icon-btn {
    width: 100%;
    min-height: 48px;
    flex-direction: row;
    justify-content: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 14px;
  }
  .top-bar .controls .icon-btn .btn-label {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .top-bar .controls #btnLang.icon-btn.icon-btn-lang {
    width: 100%;
    max-width: none;
    min-width: 0;
    justify-content: flex-start;
  }
  .top-bar .controls #btnLang .btn-lang-text { font-size: 0.92rem; }
  .top-bar .controls .reset-btn {
    width: 100%;
    margin-top: 4px;
    padding: 12px 16px;
    font-size: 0.95rem;
  }
  .levelup-icon { font-size: 4.2rem; }
  .levelup-text { font-size: 1.35rem; padding: 0 8px; }
  .levelup-sub { font-size: 0.92rem; padding: 0 12px; }
  .stats-card-inner { padding: 20px 18px; }
  .help-card-inner { padding: 22px 18px 16px; }
  .challenge-results-card { padding: 24px 20px; }
}

/* Limited height (e.g. 540×720): less vertical padding so flex layout fits without page scroll */

<template id="helpContentNl">
    <div class="help-section">
      <h3>🖐️🎲🔢 Modi</h3>
      <ul>
        <li><strong>Handen</strong> — 0–5 per hand; antwoorden 0–10 (36 sommen).</li>
        <li><strong>Dobbelstenen</strong> — 1–6 per steen; antwoorden 2–12 (36 sommen).</li>
        <li><strong>Cijfers</strong> — Zelfde als handen, zonder plaatjes.</li>
        <li><strong>Auto</strong> — Start met handen; schakelt naar dobbelstenen bij voldoende voortgang.</li>
      </ul>
      <p>Handen en dobbelstenen overlappen 25 sommen (1+1 t/m 5+5). Totaal <strong>47 unieke</strong> sommen over alle modi.</p>
    </div>

    <div class="help-section">
      <h3>🧠 Adaptief</h3>
      <p>Moeilijke sommen vaker, makkelijke minder (spaced repetition). Per som worden 3+2 en 2+3 apart bijgehouden; cijfers tellen mee met handen/dobbelstenen.</p>
      <p><strong>Geleerd:</strong> minstens 3× goed, gemiddelde reactie onder 4 s, gemiddeld minder dan 0,5 foute poging per keer.</p>
      <p><strong>Auto — niveau omhoog</strong> (naar dobbelstenen): alle 36 handensommen minst 1× goed, minst 50% geleerd, laatste 10 antwoorden minst 70% goed, gemiddelde reactie (goede antwoorden) onder 8 s. Bij te veel moeite terug naar handen.</p>
      <p><strong>Voortgangsbalk:</strong> geleerd en gezien (minst 1× goed) van de 36; bij 36/36 een feestje.</p>
    </div>

    <div class="help-section">
      <h3>⏱️ Uitdaging</h3>
      <p><strong>1 minuut</strong> — zo veel mogelijk goed.</p>
    </div>

    <div class="help-section">
      <h3>🎯 Invoer</h3>
      <p><strong>Knoppen</strong>, <strong>toetsenbord</strong> (één cijfer = meteen bevestigen), of <strong>spraak</strong>. Korte pauze na elke vraag zodat tellen niet per ongeluk wordt meegenomen.</p>
    </div>

    <div class="help-section">
      <h3>📊 Meer</h3>
      <p>Tik op de score (✓/✗) voor details. Snel veel willekeurige fouten: waarschuwing (bijv. “tel de vingers”).</p>
    </div>
</template>

<template id="helpContentEn">
    <div class="help-section">
      <h3>🖐️🎲🔢 Modes</h3>
      <ul>
        <li><strong>Hands</strong> — 0–5 per hand; answers 0–10 (36 sums).</li>
        <li><strong>Dice</strong> — 1–6 per die; answers 2–12 (36 sums).</li>
        <li><strong>Numbers</strong> — Same as hands, digits only.</li>
        <li><strong>Auto</strong> — Starts with hands; switches to dice when progress is strong enough.</li>
      </ul>
      <p>Hands and dice overlap 25 sums (1+1 through 5+5). <strong>47 unique</strong> sums across all modes.</p>
    </div>

    <div class="help-section">
      <h3>🧠 Adaptive</h3>
      <p>Harder sums return more often (spaced repetition). “3+2” and “2+3” are tracked separately; numbers mode shares stats with hands/dice.</p>
      <p><strong>Learned:</strong> at least 3 correct, average response under 4 s, average fewer than 0.5 wrong attempts per turn.</p>
      <p><strong>Auto — level up</strong> (to dice): all 36 hand sums correct at least once, at least 50% learned, last 10 answers at least 70% correct, average response on correct answers under 8 s. Switches back to hands if it gets too hard.</p>
      <p><strong>Progress bar:</strong> learned and seen (at least once correct) out of 36; celebration at 36/36.</p>
    </div>

    <div class="help-section">
      <h3>⏱️ Challenge</h3>
      <p><strong>1 minute</strong> — answer as many correctly as you can.</p>
    </div>

    <div class="help-section">
      <h3>🎯 Input</h3>
      <p><strong>Buttons</strong>, <strong>keyboard</strong> (one digit submits), or <strong>voice</strong>. Short pause after each question so counting isn’t picked up by the mic.</p>
    </div>

    <div class="help-section">
      <h3>📊 More</h3>
      <p>Tap the score (✓/✗) for details. Many quick random wrong answers trigger a hint (e.g. “count the fingers”).</p>
    </div>
</template>

function readStoredBool(key, defaultVal) {
  try {
    const v = localStorage.getItem(key);
    if (v === '0') return false;
    if (v === '1') return true;
  } catch (_) {}
  return defaultVal;
}
function writeStoredBool(key, val) {
  try { localStorage.setItem(key, val ? '1' : '0'); } catch (_) {}
}

function getSlowDownPhrases() {
  const countWhat = state.activeVisual === 'dice' ? t('countDots')
    : state.activeVisual === 'hand' ? t('countFingers') : t('countNumbers');
  const hint = t('slowCalm').replace('{hint}', countWhat);
  return [t('slowStop'), hint, t('slowNoClick'), t('slowLook'), t('slowCount')];
}
let lastEncouragement = -1;
function randomEncouragement() {
  const list = getEncouragementList();
  let idx;
  do { idx = Math.floor(Math.random() * list.length); }
  while (idx === lastEncouragement && list.length > 1);
  lastEncouragement = idx;
  return list[idx];
}

function syncThemeColor() {

  if (!meta) return;
  meta.setAttribute('content', document.body.classList.contains('dark') ? '#1a1a2e' : '#ffffff');

function isNavMenuLayout() {
  return typeof window.matchMedia === 'function' && window.matchMedia('(max-width: 900px)').matches;
}

function syncNavMenuAria() {
  if (!btnNavMenu || !navDrawer || !navBackdrop) return;
  const open = topBar.classList.contains('nav-open');
  btnNavMenu.setAttribute('aria-expanded', open ? 'true' : 'false');
  btnNavMenu.setAttribute('aria-label', open ? t('navMenuClose') : t('navMenuOpen'));
  if (isNavMenuLayout()) {
    navBackdrop.setAttribute('aria-hidden', open ? 'false' : 'true');
    navDrawer.setAttribute('aria-hidden', open ? 'false' : 'true');
  } else {
    navBackdrop.setAttribute('aria-hidden', 'true');
    navDrawer.removeAttribute('aria-hidden');
  }
}

function setNavScrollLock(locked) {
  const v = locked ? 'hidden' : '';
  document.documentElement.style.overflow = v;
  document.body.style.overflow = v;
}

function closeNavMenu() {
  if (!topBar.classList.contains('nav-open')) return;
  topBar.classList.remove('nav-open');
  setNavScrollLock(false);
  syncNavMenuAria();
}

function toggleNavMenu() {
  if (!isNavMenuLayout()) return;
  topBar.classList.toggle('nav-open');
  setNavScrollLock(topBar.classList.contains('nav-open'));
  syncNavMenuAria();
}

function setLang(lang) {
  if (lang !== 'en' && lang !== 'nl') return;
  state.lang = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
  cachedVoice = null;
  voiceSearched = false;
  cachedVoiceLang = null;
  if (state.voiceEnabled) {
    stopListening();
    startListening();
  }
  applyLanguage();
  if (!state.busy) renderQuestion();
}

// ─── Audio ───
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playCorrectSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(523.25, now);
  osc.frequency.setValueAtTime(659.25, now + .12);
  osc.frequency.setValueAtTime(783.99, now + .24);
  gain.gain.setValueAtTime(.25, now);
  gain.gain.exponentialRampToValueAtTime(.001, now + .5);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now); osc.stop(now + .5);
}

function playIncorrectSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(280, now);
  osc.frequency.linearRampToValueAtTime(220, now + .3);
  gain.gain.setValueAtTime(.18, now);
  gain.gain.exponentialRampToValueAtTime(.001, now + .4);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now); osc.stop(now + .4);
}

function playModeSwitchSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [440, 554.37, 659.25].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(.15, now + i*.08);
    g.gain.exponentialRampToValueAtTime(.001, now + i*.08 + .2);
    o.connect(g).connect(audioCtx.destination);
    o.start(now + i*.08); o.stop(now + i*.08 + .2);
  });
}

function playWarningSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [300, 250, 200].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(.12, now + i * .15);
    g.gain.exponentialRampToValueAtTime(.001, now + i * .15 + .12);
    o.connect(g).connect(audioCtx.destination);
    o.start(now + i * .15); o.stop(now + i * .15 + .12);
  });
}

/* ─── Speech Synthesis ─── */
let cachedVoice = null, voiceSearched = false, cachedVoiceLang = null, cachedTtsGender = null;

function getTtsGender() {
  try {
    const g = localStorage.getItem(TTS_GENDER_KEY);
    if (g === 'male' || g === 'female') return g;
  } catch (_) {}
  return 'female';
}
function setTtsGender(g) {
  if (g !== 'male' && g !== 'female') return;
  try { localStorage.setItem(TTS_GENDER_KEY, g); } catch (_) {}
  cachedVoice = null;
  voiceSearched = false;
  cachedVoiceLang = null;
  cachedTtsGender = null;
}

/** Best-effort from voice name (Web Speech API has no standard gender field). */
function classifyVoiceGender(v) {
  const n = v.name.toLowerCase();
  if (/\bfemale\b|\bvrouw\b|\(f\)|female voice|google.*\bfemale\b|microsoft.*\bfemale\b|zira|samantha|hazel|nicole|emma\b|katja|hedda|salli|joanna|ivy|kimberly|kendra|linda|veena|fiona|sonia|laura\b|lea\b|celine|mathilde|aditi|aria\b/.test(n)) return 'female';
  if (/\bmale\b|\bman\b|\(m\)|male voice|google.*\bmale\b|microsoft.*\bmale\b|david|fred\b|mark\b|james|george|eric\b|frank|guy\b|ryan\b|maarten|martijn|thomas|brian|pablo|enrique|diego|karl|justin|jason/.test(n)) return 'male';
  return 'unknown';
}

function findSpeechVoice() {
  const want = state.lang === 'en' ? 'en' : 'nl';
  const wantGender = getTtsGender();
  if (cachedVoice && voiceSearched && cachedVoiceLang === want && cachedTtsGender === wantGender) return cachedVoice;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  voiceSearched = true;
  cachedVoiceLang = want;
  cachedTtsGender = wantGender;

  const pool = voices.filter(v => v.lang.startsWith(want));
  const preferred = ['Google','Microsoft','Apple','Natural','Premium','Enhanced'];
  const female = [], male = [], unknown = [];
  for (const v of pool) {
    const g = classifyVoiceGender(v);
    if (g === 'female') female.push(v);
    else if (g === 'male') male.push(v);
    else unknown.push(v);
  }
  const order = wantGender === 'female'
    ? [female, unknown, male]
    : [male, unknown, female];

  function pickPreferred(group) {
    for (const kw of preferred) {
      const m = group.find(v => v.name.includes(kw));
      if (m) return m;
    }
    return null;
  }
  for (const grp of order) {
    if (!grp.length) continue;
    const hit = pickPreferred(grp);
    if (hit) { cachedVoice = hit; return hit; }
  }
  for (const grp of order) {
    if (grp.length) { cachedVoice = grp[0]; return cachedVoice; }
  }
  cachedVoice = pool.length ? pool[0] : null;
  return cachedVoice;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {
    voiceSearched = false;
    cachedVoice = null;
    cachedVoiceLang = null;
    cachedTtsGender = null;
  };
}

/** Ignore STT while TTS plays — we no longer stop/start recognition (that re-triggered mic prompts every time). */
let voiceIgnoreInputForTts = false;

function attemptVoiceRecStart(rec) {
  if (!state.voiceEnabled || state.recognition !== rec) return;
  try { rec.start(); } catch (_) {
    setTimeout(() => {
      if (state.voiceEnabled && state.recognition === rec) {
        try { rec.start(); } catch (_) {}
      }
    }, 400);
  }
}

function speechIsBlockingVoiceInput() {
  if (voiceIgnoreInputForTts) return true;
  try {
    return !!(window.speechSynthesis && window.speechSynthesis.speaking);
  } catch (_) {
    return voiceIgnoreInputForTts;
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  voiceIgnoreInputForTts = true;

  const u = new SpeechSynthesisUtterance(text);
  u.lang = localeTag();
  const v = findSpeechVoice();
  if (v) u.voice = v;
  u.rate = 0.88 + Math.random() * 0.18;
  u.pitch = 1.0 + Math.random() * 0.2;
  u.volume = 1;
  const fin = () => {
    voiceIgnoreInputForTts = false;
  };
  u.onend = fin;
  u.onerror = fin;
  speechSynthesis.speak(u);
}

/* ─── Question Generation (smart selection) ───
   Problem space:
     Hand/Numbers: 0-5 + 0-5 = 36 problems, outcomes 0-10
     Dice:         1-6 + 1-6 = 36 problems, outcomes 2-12
     Overlap:      1-5 + 1-5 = 25 shared problems
     Total unique:             47 problems across modes
   Stats are shared via problemStats["a+b"] keys — a mastered
   fact transfers across visual representations.
   Mastery criteria based on math fact fluency research:
     >= 3 correct, avg response < 4s, avg wrong attempts < 0.5
   Voice: handleAnswer subtracts VOICE_COOLDOWN_MS from elapsed time so the
   enforced mic pause does not dominate the average (adaptive weights stay fair).
*/
const MASTERY_FAST_MS = 4000;
const MIN_REPEATS = 3;

function isProblemMastered(ps) {
  if (!ps || ps.count < MIN_REPEATS) return false;
  const avgMs = ps.totalMs / ps.count;
  const avgWrong = ps.totalWrong / ps.count;
  return avgMs < MASTERY_FAST_MS && avgWrong < 0.5;
}

function generateQuestion() {
  const visual = state.activeVisual;
  const min = visual === 'dice' ? 1 : 0;
  const max = visual === 'dice' ? 6 : 5;

  const candidates = [];
  for (let a = min; a <= max; a++) {
    for (let b = min; b <= max; b++) {
      const key = a + '+' + b;
      const ps = state.problemStats[key];
      let weight;
      if (!ps) {
        weight = 15;
      } else if (ps.count < MIN_REPEATS) {
        weight = 10 + (MIN_REPEATS - ps.count) * 2;
      } else {
        const avgMs = ps.totalMs / ps.count;
        const avgWrong = ps.totalWrong / ps.count;
        if (isProblemMastered(ps)) {
          weight = Math.max(0.2, 1 / ps.count);
        } else if (avgMs >= MASTERY_FAST_MS || avgWrong >= 0.5) {
          weight = 8 + Math.min(avgMs / 1000, 5);
        } else {
          weight = 5;
        }
      }
      if (a === state.a && b === state.b) weight = 0;
      candidates.push({ a, b, weight });
    }
  }

  const totalWeight = candidates.reduce((s, c) => s + c.weight, 0);
  if (totalWeight === 0) {
    const c = candidates[Math.floor(Math.random() * candidates.length)];
    state.a = c.a; state.b = c.b;
  } else {
    let r = Math.random() * totalWeight;
    for (const c of candidates) {
      r -= c.weight;
      if (r <= 0) { state.a = c.a; state.b = c.b; break; }
    }
  }

  state.answer = state.a + state.b;
  state.questionShownAt = Date.now();
  state.wrongAttemptsThisQ = 0;
  state.lastWrongTime = 0;
  state.lastWrongValue = null;
  state.sameValueStreak = 0;
}
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

/* ════════════════════════════════════════════
   HAND RENDERING — Wikimedia Commons File:Hand_0.svg … Hand_5.svg.
   Fetched at runtime from upload.wikimedia.org → inline SVG (CSS vars).
   ════════════════════════════════════════════ */
const HAND_SVG_URLS = [
  'https://upload.wikimedia.org/wikipedia/commons/d/df/Hand_0.svg',
  'https://upload.wikimedia.org/wikipedia/commons/a/a8/Hand_1.svg',
  'https://upload.wikimedia.org/wikipedia/commons/3/3a/Hand_2.svg',
  'https://upload.wikimedia.org/wikipedia/commons/0/03/Hand_3.svg',
  'https://upload.wikimedia.org/wikipedia/commons/3/38/Hand_4.svg',
  'https://upload.wikimedia.org/wikipedia/commons/c/c6/Hand_5.svg',
];

/** Raw SVG text from Wikimedia (one entry per finger count). */
const handSvgRaw = [];

function normalizeHandSvgWrapper(xml) {
  xml = xml.replace(
    /<path\s+fill="#fefefe"\s+d="\s*M\s+0\.00\s+0\.00\s+L\s+404\.00\s+0\.00\s+L\s+404\.00\s+498\.00\s+L\s+0\.00\s+498\.00\s+L\s+0\.00\s+0\.00\s+Z\s*"\s*\/?>\s*/i,
    ''
  );
  xml = xml.replace(/<svg(\b[^>]*)>/, (full, attrs) => {
    if (/hand-inline-svg/.test(attrs)) return full;
    let a = attrs
      .replace(/\s+width\s*=\s*"[^"]*"/gi, '')
      .replace(/\s+height\s*=\s*"[^"]*"/gi, '')
      .replace(/\s+width\s*=\s*'[^']*'/gi, '')
      .replace(/\s+height\s*=\s*'[^']*'/gi, '');
    if (!/preserveAspectRatio\s*=/.test(a)) {
      a += ' preserveAspectRatio="xMidYMid meet"';
    }
    return `<svg class="hand-inline-svg" aria-hidden="true" focusable="false"${a}>`;
  });
  return xml;
}

/** Light mode: Commons SVG + normalize; off-whites → pure white (no full-SVG white rect — that showed as a box on the page bg). */
function prepareHandSvgPlain(xml) {
  xml = normalizeHandSvgWrapper(xml);
  xml = xml.replace(/#fefefe/gi, '#ffffff');
  return xml;
}

/** Dark mode: map fills to theme CSS variables. */
function prepareHandSvgThemed(xml) {
  xml = normalizeHandSvgWrapper(xml);
  const sil = 'fill="var(--hand-silhouette)"';
  const hi = 'fill="var(--hand-highlight)"';
  xml = xml.replace(/fill\s*=\s*["'](#[0-9a-fA-F]{3})["']/gi, (full, hex) => {
    const h = hex.toLowerCase();
    if (h === '#000') return sil;
    if (h === '#fff') return hi;
    return full;
  });
  xml = xml.replace(/fill\s*=\s*["'](#[0-9a-fA-F]{6})["']/gi, (full, hex) => {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255;
    const g = (n >> 8) & 255;
    const b = n & 255;
    const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
    if (lum < 0.14) return sil;
    if (lum > 0.88) return hi;
    return lum < 0.5 ? sil : hi;
  });
  return xml;
}

async function preloadHandSvgs() {
  await Promise.all(
    HAND_SVG_URLS.map(async (url, n) => {
      try {
        const r = await fetch(url, { mode: 'cors' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        handSvgRaw[n] = await r.text();
      } catch (_) {
        handSvgRaw[n] = '';
      }
    })
  );
}

function handSvgMarkupForCount(n) {
  const raw = handSvgRaw[n];
  if (raw == null || raw === '') return '';
  return document.body.classList.contains('dark')
    ? prepareHandSvgThemed(raw)
    : prepareHandSvgPlain(raw);
}

function renderHands(a, b) {
  const fing = t('altFingers');
  const labelA = `${a} ${fing}`;
  const labelB = `${b} ${fing}`;
  const svgA = handSvgMarkupForCount(a);
  const svgB = handSvgMarkupForCount(b);
  return `
    <div class="hand-visual">
      <div class="hand-svg-wrap hand-canvas mirrored" data-hand-count="${a}" role="img" aria-label="${labelA.replace(/"/g, '&quot;')}">${svgA}</div>
      <span class="hand-label">${a}</span>
    </div>
    <span class="plus">+</span>
    <div class="hand-visual">
      <div class="hand-svg-wrap hand-canvas" data-hand-count="${b}" role="img" aria-label="${labelB.replace(/"/g, '&quot;')}">${svgB}</div>
      <span class="hand-label">${b}</span>
    </div>
    <span class="equals">=</span>
    <span class="answer-spot waiting" id="answerSpot">?</span>
  `;
}

/* ─── Dice Rendering ─── */
function dotPositions(n) {
  return {1:[[1,1]],2:[[0,2],[2,0]],3:[[0,2],[1,1],[2,0]],
    4:[[0,0],[0,2],[2,0],[2,2]],5:[[0,0],[0,2],[1,1],[2,0],[2,2]],
    6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]}[n]||[];
}
let diceIdCounter = 0;
function renderDiceSVG(value) {
  const uid = diceIdCounter++;
  const dots = dotPositions(value);
  const s = 96, spacing = 22, pad = 26, dotR = 8;
  const isDark = document.body.classList.contains('dark');
  const faceBorder = isDark?'#5a5a7a':'#c8c8b8';
  const faceHi = isDark?'#4a4a64':'#fefefc';
  const faceLo = isDark?'#2a2a3e':'#d8d8c8';
  const pipC = isDark?'#e0e0e0':'#1a1a1a';
  const pipH = isDark?'#f5f5f5':'#4a4a4a';
  let svg = `<defs>
    <linearGradient id="dg${uid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${faceHi}"/><stop offset="100%" stop-color="${faceLo}"/></linearGradient>
    <radialGradient id="pip${uid}"><stop offset="0%" stop-color="${pipH}"/><stop offset="100%" stop-color="${pipC}"/></radialGradient>
    <filter id="ds${uid}"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity=".22"/></filter>
    <filter id="ps${uid}"><feDropShadow dx="0" dy="1" stdDeviation=".6" flood-opacity=".35"/></filter>
  </defs>`;
  svg += `<rect x="3" y="3" width="${s-6}" height="${s-6}" rx="16" fill="url(#dg${uid})" filter="url(#ds${uid})" stroke="${faceBorder}" stroke-width="1.5"/>`;
  svg += `<rect x="6" y="6" width="${s-12}" height="${s-12}" rx="13" fill="none" stroke="${faceHi}" stroke-width=".8" opacity=".5"/>`;
  dots.forEach(([r,c])=>{
    const cx=pad+c*spacing, cy=pad+r*spacing;
    svg+=`<circle cx="${cx}" cy="${cy}" r="${dotR}" fill="url(#pip${uid})" filter="url(#ps${uid})"/>`;
    svg+=`<circle cx="${cx-1.5}" cy="${cy-1.5}" r="${dotR*.35}" fill="${pipH}" opacity=".4"/>`;
  });
  return `<svg viewBox="0 0 ${s} ${s}" class="dice-svg">${svg}</svg>`;
}
function renderDice(a, b) {
  return `
    <div class="hand-visual">${renderDiceSVG(a)}<span class="dice-label">${a}</span></div>
    <span class="plus">+</span>
    <div class="hand-visual">${renderDiceSVG(b)}<span class="dice-label">${b}</span></div>
    <span class="equals">=</span>
    <span class="answer-spot waiting" id="answerSpot">?</span>
  `;
}

function renderNumbers(a, b) {
  return `
    <div class="num-visual">${a}</div>
    <span class="plus">+</span>
    <div class="num-visual">${b}</div>
    <span class="equals">=</span>
    <span class="answer-spot waiting" id="answerSpot">?</span>
  `;
}

/* ─── Render Question ─── */
function renderQuestion() {
  const { a, b, activeVisual } = state;
  const renderers = { hand: renderHands, dice: renderDice, numbers: renderNumbers };
  visualRow.innerHTML = (renderers[activeVisual] || renderNumbers)(a, b);
  renderAnswerButtons();
  state.questionShownAt = Date.now();
  state.keyBuffer = '';
  clearTimeout(state.keyTimer);
  if (state.voiceEnabled) startVoiceCooldown();
  updateProgressBar();
}

/* ─── Answer Buttons ─── */
function renderAnswerButtons() {
  let html = '';
  if (state.activeVisual === 'hand' || state.activeVisual === 'numbers') {
    let r1 = '', r2 = '';
    for (let i = 0; i <= 5; i++) r1 += `<button class="answer-btn" data-value="${i}">${i}</button>`;
    for (let i = 6; i <= 10; i++) r2 += `<button class="answer-btn" data-value="${i}">${i}</button>`;
    html = `<div class="answer-row">${r1}</div><div class="answer-row">${r2}</div>`;
  } else {
    /* dice: same 6+5 row split as hands/numbers so keypad size stays consistent (auto mode hands→dice) */
    let r1 = '', r2 = '';
    for (let i = 2; i <= 7; i++) r1 += `<button class="answer-btn" data-value="${i}">${i}</button>`;
    for (let i = 8; i <= 12; i++) r2 += `<button class="answer-btn" data-value="${i}">${i}</button>`;
    html = `<div class="answer-row">${r1}</div><div class="answer-row">${r2}</div>`;
  }
  answerGrid.innerHTML = html;
  answerGrid.querySelectorAll('.answer-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.value)));
  });
}

/* ─── Answer Handling ─── */
function handleAnswer(value, opts = {}) {
  if (state.busy) return;
  state.busy = true;
  state.keyBuffer = '';
  clearTimeout(state.keyTimer);

  const correct = value === state.answer;
  const rawMs = Date.now() - state.questionShownAt;
  const responseTime =
    opts.fromVoice && state.voiceEnabled
      ? Math.max(0, rawMs - VOICE_COOLDOWN_MS)
      : rawMs;
  const btns = answerGrid.querySelectorAll('.answer-btn');
  const spot = document.getElementById('answerSpot');

  if (spot) {
    spot.textContent = value;
    spot.classList.remove('waiting');
    spot.classList.add(correct ? 'result-correct' : 'result-incorrect');
  }

  if (correct) {
    state.totalCorrect++;
    state.totalQuestions++;
    state.totalWrongAttempts += state.wrongAttemptsThisQ;
    state.history.push({ correct: true, timeMs: responseTime, wrongAttempts: state.wrongAttemptsThisQ });
    const pKey = state.a + '+' + state.b;
    if (!state.problemStats[pKey]) state.problemStats[pKey] = { count: 0, totalMs: 0, totalWrong: 0, firstTryCorrect: 0 };
    const ps = state.problemStats[pKey];
    if (state.wrongAttemptsThisQ === 0) ps.firstTryCorrect++;
    ps.count++;
    ps.totalMs += responseTime;
    ps.totalWrong += state.wrongAttemptsThisQ;
    if (state.challengeActive) state.challengeCorrect++;
    if (state.mode === 'auto') {
      state.autoSessionQuestions++;
      if (state.wrongAttemptsThisQ === 0) state.autoSessionCorrectFirstTry++;
    }
    playCorrectSound();
    speak(randomEncouragement());

    btns.forEach(b => {
      if (parseInt(b.dataset.value) === value) b.classList.add('correct-flash');
      b.disabled = true;
    });
    spawnCelebration();
    trimHistory(); updateScore(); adaptDifficulty();
    if (state.challengeActive) challengeScore.textContent = state.challengeCorrect;

    if (!state.levelingUp) {
      setTimeout(() => {
        generateQuestion(); renderQuestion(); state.busy = false;
      }, 1600);
    }
  } else {
    const now = Date.now();
    const rapidClick = state.lastWrongTime > 0 && (now - state.lastWrongTime) < MONKEY_CLICK_INTERVAL_MS;
    if (value === state.lastWrongValue) {
      state.sameValueStreak++;
    } else {
      state.sameValueStreak = 1;
      state.lastWrongValue = value;
    }
    state.wrongAttemptsThisQ++;
    state.lastWrongTime = now;
    state.totalIncorrect++;
    if (state.mode === 'auto') state.autoSessionWrongAttempts++;
    state.history.push({ correct: false, timeMs: responseTime, wrongAttempts: state.wrongAttemptsThisQ });

    const isMonkey = (state.wrongAttemptsThisQ >= MONKEY_CLICK_THRESHOLD && rapidClick) || state.sameValueStreak >= MONKEY_CLICK_THRESHOLD;
    if (isMonkey) {
      playWarningSound();
      const phrases = getSlowDownPhrases();
      const phrase = phrases[Math.floor(Math.random() * phrases.length)];
      speak(phrase);

      const mb = $('monkeyBanner');
      mb.textContent = '🐵 ' + phrase;
      mb.classList.remove('visible');
      void mb.offsetWidth;
      mb.classList.add('visible');

      btns.forEach(b => { b.disabled = true; });
      setTimeout(() => {
        mb.classList.remove('visible');
        btns.forEach(b => {
          if (!b.classList.contains('incorrect-flash')) b.disabled = false;
        });
        if (spot) {
          spot.textContent = '?';
          spot.classList.remove('result-incorrect');
          spot.classList.add('waiting');
        }
        state.keyBuffer = '';
        clearTimeout(state.keyTimer);
        state.busy = false;
      }, 2500);
      trimHistory(); updateScore(); adaptDifficulty();
      return;
    }

    playIncorrectSound();
    speak(t('speechTryAgain'));

    btns.forEach(b => {
      if (parseInt(b.dataset.value) === value) {
        b.classList.add('incorrect-flash'); b.disabled = true;
      }
    });
    trimHistory(); updateScore(); adaptDifficulty();

    setTimeout(() => {
      if (spot) {
        spot.textContent = '?';
        spot.classList.remove('result-incorrect');
        spot.classList.add('waiting');
      }
      state.keyBuffer = '';
      clearTimeout(state.keyTimer);
      state.busy = false;
    }, 1200);
  }
}

function trimHistory() {
  if (state.history.length > HISTORY_LENGTH) state.history = state.history.slice(-HISTORY_LENGTH);
}

/* ─── Celebration ─── */
function spawnCelebration() {
  const colors = ['#ff7043','#ffa726','#ffee58','#66bb6a','#42a5f5','#ab47bc','#ec407a'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100+'%';
    el.style.background = colors[i%colors.length];
    el.style.animationDuration = (.8+Math.random()*1)+'s';
    el.style.animationDelay = Math.random()*.3+'s';
    el.style.width = (6+Math.random()*8)+'px';
    el.style.height = (6+Math.random()*8)+'px';
    frag.appendChild(el);
  }
  celebration.appendChild(frag);
  setTimeout(() => { celebration.innerHTML = ''; }, 2000);
}

function updateScore() {
  correctCount.textContent = '✓ ' + state.totalCorrect;
  incorrectCount.textContent = '✗ ' + state.totalIncorrect;
}

/* ════════════════════════════════════════════
   ADAPTIVE DIFFICULTY (accuracy + speed)
   ════════════════════════════════════════════ */
function adaptDifficulty() {
  if (state.history.length < 4) return;

  const recent = state.history.slice(-HISTORY_LENGTH);
  const correctOnes = recent.filter(h => h.correct);
  const ratio = correctOnes.length / recent.length;

  let avgTime = Infinity;
  if (correctOnes.length >= 2) {
    avgTime = correctOnes.reduce((s, h) => s + h.timeMs, 0) / correctOnes.length;
  }
  const isSlow = avgTime > SLOW_ANSWER_MS;

  const avgWrongAttempts = recent.reduce((s, h) => s + (h.wrongAttempts || 0), 0) / recent.length;
  const isMonkeyClicking = avgWrongAttempts >= 2;

  if (state.mode === 'auto') {
    const progress = getMasteryProgress(state.activeVisual);
    if (state.activeVisual === 'hand' && progress.seen === progress.total && progress.pct >= 0.5 && ratio >= 0.7 && !isSlow) {
      showLevelUp('dice');
    } else if (state.activeVisual === 'dice' && recent.length >= HISTORY_LENGTH &&
               (ratio <= AUTO_SWITCH_THRESHOLD_DOWN || isMonkeyClicking || (isSlow && ratio <= 0.55))) {
      switchVisual('hand');
    }
  }

  updateProgressBar();
}

function getMasteryProgress(visual) {
  const min = visual === 'dice' ? 1 : 0;
  const max = visual === 'dice' ? 6 : 5;
  let mastered = 0, seen = 0, total = 0;
  for (let a = min; a <= max; a++) {
    for (let b = min; b <= max; b++) {
      total++;
      const ps = state.problemStats[a + '+' + b];
      if (ps && ps.count > 0) seen++;
      if (isProblemMastered(ps)) mastered++;
    }
  }
  return { mastered, seen, total, pct: total > 0 ? mastered / total : 0 };
}

function updateProgressBar() {
  const wrap = $('progressWrap');
  const fill = $('progressFill');
  const label = $('progressLabel');

  const { mastered, seen, total, pct } = getMasteryProgress(state.activeVisual);
  const pctRound = Math.round(pct * 100);
  const icons = { hand: '🖐️', dice: '🎲', numbers: '🔢' };
  const names = { hand: t('nameHand'), dice: t('nameDice'), numbers: t('nameNumbers') };
  const icon = icons[state.activeVisual] || '🔢';
  const vname = names[state.activeVisual] || t('nameNumbers');

  label.textContent = t('progressLine')
    .replace('{icon}', icon).replace('{name}', vname)
    .replace('{mastered}', String(mastered)).replace(/\{total\}/g, String(total))
    .replace('{seen}', String(seen));
  fill.style.width = pctRound + '%';
  fill.classList.toggle('high', pct >= 0.7);
  wrap.classList.add('visible');

  if (mastered === total && seen === total && total > 0 && !state.masteryCelebrated[state.activeVisual]) {
    state.masteryCelebrated[state.activeVisual] = true;
    if (featureMasteryCelebration) showMasteryCelebration(vname);
  }
}

function showMasteryCelebration(visualName) {
  const overlay = $('masteryOverlay');
  $('masteryTitle').textContent = t('masteryVisualDone').replace('{name}', visualName);
  $('masterySub').textContent = t('masterySubDone');
  playLevelUpSound();
  spawnCelebration();
  speak(t('speechMastery'));
  overlay.classList.add('visible');
}

/* ─── Auto-mode session (localStorage) ─── */
const AUTO_SESSION_KEY = 'rekenapp_auto_sessions';

function clearLearningProgress() {
  state.problemStats = {};
  state.history = [];
  state.masteryCelebrated = {};
  state.totalCorrect = 0;
  state.totalIncorrect = 0;
  state.totalQuestions = 0;
  state.totalWrongAttempts = 0;
  updateScore();
}

function startAutoSessionTracking() {
  const h = getMasteryProgress('hand');
  const d = getMasteryProgress('dice');
  state.autoSessionStart = Date.now();
  state.autoSessionQuestions = 0;
  state.autoSessionCorrectFirstTry = 0;
  state.autoSessionWrongAttempts = 0;
  state.autoLeveledUpThisSession = false;
  state.autoSnapHand = { mastered: h.mastered, seen: h.seen };
  state.autoSnapDice = { mastered: d.mastered, seen: d.seen };
}

function endAutoSessionAndSave() {
  if (state.autoSessionStart == null) return;
  const hEnd = getMasteryProgress('hand');
  const dEnd = getMasteryProgress('dice');
  const entry = {
    date: new Date().toISOString(),
    durationMs: Date.now() - state.autoSessionStart,
    questionsAnswered: state.autoSessionQuestions,
    correctFirstTry: state.autoSessionCorrectFirstTry,
    wrongAttempts: state.autoSessionWrongAttempts,
    masteredStart: (state.autoSnapHand?.mastered ?? 0) + (state.autoSnapDice?.mastered ?? 0),
    masteredEnd: hEnd.mastered + dEnd.mastered,
    seenStart: (state.autoSnapHand?.seen ?? 0) + (state.autoSnapDice?.seen ?? 0),
    seenEnd: hEnd.seen + dEnd.seen,
    leveledUp: state.autoLeveledUpThisSession,
    handMasteredStart: state.autoSnapHand?.mastered ?? 0,
    handMasteredEnd: hEnd.mastered,
    handSeenStart: state.autoSnapHand?.seen ?? 0,
    handSeenEnd: hEnd.seen,
    diceMasteredStart: state.autoSnapDice?.mastered ?? 0,
    diceMasteredEnd: dEnd.mastered,
    diceSeenStart: state.autoSnapDice?.seen ?? 0,
    diceSeenEnd: dEnd.seen,
  };
  try {
    const list = JSON.parse(localStorage.getItem(AUTO_SESSION_KEY) || '[]');
    list.unshift(entry);
    if (list.length > 20) list.length = 20;
    localStorage.setItem(AUTO_SESSION_KEY, JSON.stringify(list));
  } catch (_) {}
  state.autoSessionStart = null;
  state.autoSnapHand = null;
  state.autoSnapDice = null;
}

function getAutoSessionHistory() {
  try { return JSON.parse(localStorage.getItem(AUTO_SESSION_KEY) || '[]'); }
  catch { return []; }
}

function clearAutoSessionHistory() {
  try { localStorage.removeItem(AUTO_SESSION_KEY); } catch (_) {}
}

function formatSessionDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function promptAutoMode() {

function enterAutoMode(fresh) {
  state.challengePendingAction = null;
  state.afterChallengeResultsAction = null;
  if (state.challengeActive) endChallenge(true);
  if (state.mode === 'auto') endAutoSessionAndSave();
  state.mode = 'auto';
  state.activeVisual = 'hand';

    state.lastWrongTime = 0;

    visualRow.classList.remove('switching');

/* ─── Mode Switching ─── */
function runAfterChallengeOrNow(fn) {
  if (!state.challengeActive) {
    fn();
    return;
  }
  if (state.challengePaused) {
    state.challengePendingAction = fn;
    return;
  }
  state.challengePendingAction = fn;
  pauseChallenge();
}

function flushAfterChallengeResults() {
  if (state.afterChallengeResultsAction) {
    const fn = state.afterChallengeResultsAction;
    state.afterChallengeResultsAction = null;
    fn();
  }
}

function isProblemValidForVisual(a, b, visual) {
  const min = visual === 'dice' ? 1 : 0;
  const max = visual === 'dice' ? 6 : 5;
  return a >= min && a <= max && b >= min && b <= max;
}

function setMode(mode) {
  if (mode !== 'auto' && state.mode === 'auto') {
    endAutoSessionAndSave();
  }
  state.mode = mode;
  updateModeButtons();
  if (mode === 'hand') switchVisual('hand');
  else if (mode === 'dice') switchVisual('dice');
  else if (mode === 'numbers') switchVisual('numbers');
  else { updateModeLabel(); updateProgressBar(); }
}

function switchVisual(visual) {
  if (state.activeVisual === visual) { updateModeLabel(); updateProgressBar(); return; }
  state.busy = true;
  state.activeVisual = visual;
  if (!isProblemValidForVisual(state.a, state.b, visual)) {
    generateQuestion();
  } else {
    state.answer = state.a + state.b;
    state.wrongAttemptsThisQ = 0;
    state.lastWrongTime = 0;
    state.lastWrongValue = null;
    state.sameValueStreak = 0;
  }
  playModeSwitchSound();
  visualRow.classList.add('switching');
  setTimeout(() => {
    visualRow.classList.remove('switching');
    renderQuestion();
    state.busy = false;
  }, 600);
  updateModeLabel();
}

function showLevelUp(toVisual) {
  if (toVisual === 'dice') state.autoLeveledUpThisSession = true;
  if (!featureLevelUpPopup) {
    state.levelingUp = true;
    state.history = [];
    switchVisual(toVisual);
    queueMicrotask(() => { state.levelingUp = false; });
    return;
  }
  state.busy = true;
  state.levelingUp = true;
  const overlay = $('levelupOverlay');

  $('levelupIcon').textContent = toVisual === 'dice' ? '🎲' : '🖐️';
  $('levelupText').textContent = t('levelUpTitle');
  $('levelupSub').textContent = toVisual === 'dice'
    ? t('levelUpDiceSub')
    : t('levelUpHandSub');

  playLevelUpSound();
  spawnCelebration();
  speak(t('speechLevelUp'));
  overlay.classList.add('visible');

  setTimeout(() => {
    overlay.classList.remove('visible');
    state.levelingUp = false;
    state.history = [];
    switchVisual(toVisual);
  }, 2800);
}

function playLevelUpSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(.2, now + i * .15);
    g.gain.exponentialRampToValueAtTime(.001, now + i * .15 + .4);
    o.connect(g).connect(audioCtx.destination);
    o.start(now + i * .15); o.stop(now + i * .15 + .4);
  });
}

function updateModeButtons() {
  btnHand.classList.toggle('active', state.mode === 'hand');
  btnDice.classList.toggle('active', state.mode === 'dice');
  btnNumbers.classList.toggle('active', state.mode === 'numbers');
  btnAuto.classList.toggle('active', state.mode === 'auto');

/* ─── Reset ─── */
function resetGame() {
  state.challengePendingAction = null;
  state.afterChallengeResultsAction = null;
  if (state.challengeActive) endChallenge(true);
  if (state.mode === 'auto') endAutoSessionAndSave();
  state.totalCorrect = 0; state.totalIncorrect = 0;
  state.totalQuestions = 0; state.totalWrongAttempts = 0;
